<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Tiles - Classic</title>
    <style>
        /* Orqa fon och kulrangga o'zgartirildi */
        body { margin: 0; background: #222; overflow: hidden; touch-action: none; font-family: sans-serif; }
        
        @keyframes borderGlow {
            0% { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
            50% { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
            100% { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        }

        #main-menu, #result-screen {
            position: absolute; width: 100%; height: 100%; background: #222;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #fff;
        }

        #result-screen { display: none; } /* Natija ekrani boshida yashirin */

        .menu-btn {
            background: #00f2ff; color: #000; border: none; padding: 20px 50px;
            font-size: 24px; font-weight: bold; border-radius: 40px;
            cursor: pointer; box-shadow: 0 0 20px #00f2ff; transition: 0.2s;
        }
        .menu-btn:active { transform: scale(0.95); }

        #game-container { 
            width: 100vw; height: 100vh; 
            position: relative; 
            background: #222; 
            border-left: 5px solid #00f2ff;
            border-right: 5px solid #00f2ff;
            box-sizing: border-box;
            animation: borderGlow 8s infinite linear;
            display: none;
        }

        .tile {
            position: absolute; width: 25%; height: 200px;
            box-sizing: border-box;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .white-tile { background: #2a2a2a; }
        .black-tile { 
            background: #000; 
            border: 1px solid rgba(0, 255, 0, 0.3);
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.2);
        }

        #score {
            position: absolute; top: 40px; left: 50%;
            transform: translateX(-50%); color: rgba(255, 255, 255, 0.3);
            font-size: 80px; font-weight: bold; z-index: 10;
            pointer-events: none; text-shadow: 0 0 15px rgba(255,255,255,0.1);
            display: none;
        }

        .final-score { font-size: 60px; color: #00f2ff; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="font-size: 40px; margin-bottom: 30px;">PIANO TILES</h1>
        <button class="menu-btn" onclick="startGame()">O'YINNI BOSHLASH</button>
    </div>

    <div id="result-screen">
        <h2 style="margin: 0; color: #aaa;">NATIJA:</h2>
        <div id="final-score-val" class="final-score">0</div>
        <button class="menu-btn" onclick="startGame()">QAYTA BOSHLASH</button>
    </div>

    <div id="score">0</div>
    <div id="game-container"></div>

    <script>
        const container = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const mainMenu = document.getElementById('main-menu');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreVal = document.getElementById('final-score-val');
        
        let score = 0;
        let gameActive = false;
        let gameSpeed = 9; 
        let spawnInterval = 400; 
        let lastSpawn = 0;
        let tiles = [];

        const notes = [
            "https://pianosimulator.io/sounds/piano/c4.mp3",
            "https://pianosimulator.io/sounds/piano/d4.mp3",
            "https://pianosimulator.io/sounds/piano/e4.mp3",
            "https://pianosimulator.io/sounds/piano/f4.mp3",
            "https://pianosimulator.io/sounds/piano/g4.mp3"
        ];

        function playPianoSound() {
            const randomNote = notes[Math.floor(Math.random() * notes.length)];
            const audio = new Audio(randomNote);
            audio.volume = 0.5;
            audio.play();
        }

        const rainbowColors = ["#00f2ff", "#00ff00", "#ff00ff", "#ffff00", "#ff4500"];

        function startGame() {
            mainMenu.style.display = 'none';
            resultScreen.style.display = 'none';
            container.style.display = 'block';
            scoreElement.style.display = 'block';
            
            // Parametrlarni tiklash
            score = 0;
            gameSpeed = 9;
            spawnInterval = 400;
            scoreElement.innerText = "0";
            container.innerHTML = "";
            tiles = [];
            gameActive = true;
            requestAnimationFrame(update);
        }

        function createRow() {
            const blackIndex = Math.floor(Math.random() * 4);
            for (let i = 0; i < 4; i++) {
                const tileElement = document.createElement('div');
                tileElement.className = "tile " + (i === blackIndex ? "black-tile" : "white-tile");
                tileElement.style.left = (i * 25) + "%";
                let topPos = -200;
                tileElement.style.top = topPos + "px";

                if (i === blackIndex) {
                    tileElement.dataset.clicked = "false";
                    const handleEvent = (e) => {
                        e.preventDefault();
                        if (!gameActive) return;
                        if (tileElement.dataset.clicked === "false") {
                            tileElement.dataset.clicked = "true";
                            playPianoSound();
                            const color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                            tileElement.style.backgroundColor = color;
                            tileElement.style.boxShadow = `0 0 30px ${color}`;
                            score++;
                            scoreElement.innerText = score;
                            
                            if (score % 15 === 0) {
                                gameSpeed += 1.2; 
                                spawnInterval = Math.max(180, spawnInterval - 30);
                            }
                        }
                    };
                    tileElement.addEventListener('touchstart', handleEvent);
                    tileElement.onclick = handleEvent;
                } else {
                    const fail = (e) => {
                        e.preventDefault();
                        if (gameActive) gameOver();
                    }
                    tileElement.onclick = fail;
                    tileElement.addEventListener('touchstart', fail);
                }
                container.appendChild(tileElement);
                tiles.push({ element: tileElement, top: topPos, isBlack: i === blackIndex });
            }
        }

        function update(time) {
            if (!gameActive) return;
            if (time - lastSpawn > spawnInterval) {
                createRow();
                lastSpawn = time;
            }
            for (let i = tiles.length - 1; i >= 0; i--) {
                const t = tiles[i];
                t.top += gameSpeed;
                t.element.style.top = t.top + "px";
                if (t.top > window.innerHeight) {
                    if (t.isBlack && t.element.dataset.clicked === "false") {
                        gameOver();
                        return;
                    }
                    t.element.remove();
                    tiles.splice(i, 1);
                }
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            if (!gameActive) return;
            gameActive = false;
            
            // Natijani ekranga chiqarish
            finalScoreVal.innerText = score;
            container.style.display = 'none';
            scoreElement.style.display = 'none';
            resultScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
