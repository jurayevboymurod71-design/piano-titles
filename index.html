<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Tiles RGB Pro (Oq Fon)</title>
    <style>
        body { margin: 0; background: #fff; overflow: hidden; touch-action: none; font-family: sans-serif; } /* Fon oq rangga o'zgartirildi */
        
        @keyframes borderGlow {
            0% { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
            25% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            50% { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
            75% { border-color: #ffff00; box-shadow: 0 0 10px #ffff00; }
            100% { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        }

        #game-container { 
            width: 100vw; height: 100vh; 
            position: relative; 
            background: #fff; /* O'yin maydoni foni ham oq */
            border-left: 5px solid #00f2ff;
            border-right: 5px solid #00f2ff;
            box-sizing: border-box;
            animation: borderGlow 8s infinite linear;
        }

        .tile {
            position: absolute; width: 25%; height: 200px;
            box-sizing: border-box;
            border: 0.5px solid rgba(0, 0, 0, 0.1); /* To'q rangli chegara qo'shildi, oq fonda ko'rinishi uchun */
        }

        .white-tile { background: #fff; } /* Fon oq bo'lgani uchun 'white-tile' oq rangda */

        .black-tile { 
            background: #000; 
            border: 1px solid rgba(0, 255, 0, 0.3);
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .hit { transition: background 0.1s; }

        #score {
            position: absolute; top: 40px; left: 50%;
            transform: translateX(-50%); 
            color: #000; /* Ball rangini qoraga o'zgartirdik, oq fonda ko'rinishi uchun */
            font-size: 70px; font-weight: bold; z-index: 10;
            pointer-events: none; 
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.2); /* Soya ham dark bo'lishi kerak */
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div id="game-container"></div>

    <script>
      // Ovoz tizimini tayyorlash
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// PPK - Resurection kuyi notalari chastotasi
const notesFreq = {
    "e4": 329.63, "b4": 493.88, "e5": 659.25, "g4": 392.00,
    "d4": 293.66, "a4": 440.00, "d5": 587.33, "f4": 349.23,
    "c4": 261.63, "c5": 523.25, "b3": 246.94
};

// Kuy ketma-ketligi
const resurrectionSong = [
    "e4", "b4", "e5", "b4", "g4", "b4", "e4", "b4",
    "e4", "b4", "e5", "b4", "g4", "b4", "e4", "b4",
    "d4", "a4", "d5", "a4", "f4", "a4", "d4", "a4"
];
let currentNoteIndex = 0;
        const container = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        
        let score = 0;
        let gameActive = true;
        let gameSpeed = 9; 
        let spawnInterval = 400; 
        let lastSpawn = 0;
        let tiles = [];

        const notes = [
            "https://pianosimulator.io/sounds/piano/c4.mp3",
            "https://pianosimulator.io/sounds/piano/d4.mp3",
            "https://pianosimulator.io/sounds/piano/e4.mp3",
            "https://pianosimulator.io/sounds/piano/f4.mp3",
            "https://pianosimulator.io/sounds/piano/g4.mp3"
        ];

        function playPianoSound() {
            const randomNote = notes[Math.floor(Math.random() * notes.length)];
            const audio = new Audio(randomNote);
            audio.volume = 0.5;
            audio.play();
        }

        const rainbowColors = ["#00f2ff", "#00ff00", "#ff00ff", "#ffff00", "#ff4500"];

        function createRow() {
            const blackIndex = Math.floor(Math.random() * 4);
            for (let i = 0; i < 4; i++) {
                const tileElement = document.createElement('div');
                tileElement.className = "tile " + (i === blackIndex ? "black-tile" : "white-tile");
                tileElement.style.left = (i * 25) + "%";
                let topPos = -200;
                tileElement.style.top = topPos + "px";

                if (i === blackIndex) {
                    tileElement.dataset.clicked = "false";
                    const handleEvent = (e) => {
                        e.preventDefault();
                        if (tileElement.dataset.clicked === "false") {
                            tileElement.dataset.clicked = "true";
                            
                            playPianoSound();

                            const color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                            tileElement.style.backgroundColor = color;
                            tileElement.style.boxShadow = `0 0 30px ${color}`;
                            
                            score++;
                            scoreElement.innerText = score;
                            if (score % 15 === 0) {
                                gameSpeed += 1.5; 
                                spawnInterval = Math.max(180, spawnInterval - 40);
                            }
                        }
                    };
                    tileElement.addEventListener('touchstart', handleEvent);
                    tileElement.onclick = handleEvent;
                } else {
                    tileElement.onclick = gameOver;
                    tileElement.addEventListener('touchstart', gameOver);
                }

                container.appendChild(tileElement);
                tiles.push({ element: tileElement, top: topPos, isBlack: i === blackIndex });
                playPianoSound()
            }
        }

        function update(time) {
            if (!gameActive) return;
            if (time - lastSpawn > spawnInterval) {
              function playPianoSound() {
    // Agar audio "uxlayotgan" bo'lsa, uni uyg'otamiz
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = 'triangle'; // Yumshoq piyanino ovozi
    oscillator.frequency.setValueAtTime(notesFreq[resurrectionSong[currentNoteIndex]], audioCtx.currentTime);

    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.4);

    // Keyingi notaga o'tish
    currentNoteIndex = (currentNoteIndex + 1) % resurrectionSong.length;
}
                createRow();
                lastSpawn = time;
            }
            for (let i = tiles.length - 1; i >= 0; i--) {
                const t = tiles[i];
                t.top += gameSpeed;
                t.element.style.top = t.top + "px";
                if (t.top > window.innerHeight) {
                    if (t.isBlack && t.element.dataset.clicked === "false") {
                        gameOver();
                        return;
                    }
                    t.element.remove();
                    tiles.splice(i, 1);
                }
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            if (!gameActive) return;
            gameActive = false;
            alert("O'yin tugadi! Ball: " + score);
            location.reload();
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
